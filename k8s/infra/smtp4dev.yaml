apiVersion: apps/v1
kind: Deployment
metadata:
  name: smtp4dev
  namespace: ecommerce
  labels:
    app: smtp4dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: smtp4dev
  template:
    metadata:
      labels:
        app: smtp4dev
    spec:
      containers:
        - name: smtp4dev
          image: rnwood/smtp4dev:v3
          ports:
            - containerPort: 25 # SMTP
            - containerPort: 80 # UI (sent mails)
---
apiVersion: v1
kind: Service
metadata:
  name: smtp4dev
  namespace: ecommerce
spec:
  selector:
    app: smtp4dev
  ports:
    - name: smtp
      port: 25
      targetPort: 25
    - name: ui
      port: 80
      targetPort: 80
