apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-api
  namespace: ecommerce
  labels:
    app: notification-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-api
  template:
    metadata:
      labels:
        app: notification-api
    spec:
      containers:
        - name: notification-api
          image: ghcr.io/enesmemduhoglu/event-driven-ecommerce/notification-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shared-config
          env:
            - name: Smtp__Host
              value: smtp4dev
            - name: Smtp__Port
              value: "25"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: notification-api
  namespace: ecommerce
spec:
  selector:
    app: notification-api
  ports:
    - port: 8080
      targetPort: 8080
