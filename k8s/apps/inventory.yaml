apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: ecommerce
  labels:
    app: inventory-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          image: ghcr.io/enesmemduhoglu/event-driven-ecommerce/inventory-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: shared-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__InventoryDb
              value: Host=postgres;Port=5432;Database=inventory_db;Username=postgres;Password=$(POSTGRES_PASSWORD)
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: ecommerce
spec:
  selector:
    app: inventory-api
  ports:
    - port: 8080
      targetPort: 8080
