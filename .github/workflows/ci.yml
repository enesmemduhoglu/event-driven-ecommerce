name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      # Includes the Testcontainers integration tests (Category=Integration);
      # the runner's Docker daemon provides the throwaway Postgres/Redis/RabbitMQ.
      - name: Test
        run: dotnet test -c Release --no-build --logger "console;verbosity=normal"

  smoke:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      # compose up --build -> poll all /health endpoints -> e2e order-flow scenarios
      - name: Smoke test (compose + e2e order flow)
        run: pwsh ./scripts/smoke-test.ps1 -Build -Down

  docker-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [build-test, smoke]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: gateway-api
            dockerfile: src/ApiGateway/Gateway.Api/Dockerfile
          - service: identity-api
            dockerfile: src/Services/Identity/Identity.Api/Dockerfile
          - service: catalog-api
            dockerfile: src/Services/Catalog/Catalog.Api/Dockerfile
          - service: search-api
            dockerfile: src/Services/Search/Search.Api/Dockerfile
          - service: basket-api
            dockerfile: src/Services/Basket/Basket.Api/Dockerfile
          - service: ordering-api
            dockerfile: src/Services/Ordering/Ordering.Api/Dockerfile
          - service: inventory-api
            dockerfile: src/Services/Inventory/Inventory.Api/Dockerfile
          - service: payment-api
            dockerfile: src/Services/Payment/Payment.Api/Dockerfile
          - service: notification-api
            dockerfile: src/Services/Notification/Notification.Api/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:latest
            ghcr.io/${{ github.repository }}/${{ matrix.service }}:sha-${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
