name: ecommerce-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      # 5433 on the host: a locally installed Windows Postgres already occupies 5432
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: ecommerce-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # management UI (guest/guest)
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.3
    container_name: ecommerce-elasticsearch
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"   # dev only
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20

  seq:
    image: datalust/seq:2024.3
    container_name: ecommerce-seq
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "8081:80"       # UI
      - "5341:5341"     # ingestion
    volumes:
      - seq-data:/data

  smtp4dev:
    image: rnwood/smtp4dev:v3
    container_name: ecommerce-smtp4dev
    ports:
      - "8082:80"       # UI (sent mails)
      - "2525:25"       # SMTP

volumes:
  postgres-data:
  redis-data:
  rabbitmq-data:
  es-data:
  seq-data:
